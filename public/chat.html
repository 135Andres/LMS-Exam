<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Exams — Chat</title>
<script>
(function(){try{var l=localStorage.getItem('lmsLanguage');if(l==='es'||l==='en')document.documentElement.lang=l;var t=localStorage.getItem('lmsTheme');if(t==='dark'||t==='light')document.documentElement.dataset.theme=t;}catch(e){}})();
</script>
<link rel="stylesheet" href="css/welcome.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-brand" id="sidebarHome" data-i18n="brand">LMS Exams</span>
      <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" data-i18n-title="collapse" title="Colapsar (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-body">
      <a href="dashboard.html" class="dashboard-nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span data-i18n="dashboard">Dashboard</span>
      </a>
      <button class="mode-toggle-btn" id="modeToggleBtn" data-i18n="switchToExam">Cambiar a Examen</button>
      <button class="sidebar-new-chat" id="sidebarNewChat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span id="sidebarNewChatLabel" data-i18n="newChat">Nuevo Chat</span>
      </button>
      <div class="sidebar-history" id="sidebarHistory">
        <div class="sidebar-date-group">
          <div class="sidebar-date-label" data-i18n="today">Hoy</div>
          <div class="sidebar-chat-item active">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span data-i18n="currentChatLabel">Chat actual</span>
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="stopwatch-widget" id="stopwatchWidget">
        <div class="stopwatch-display" id="stopwatchDisplay">00:00</div>
        <div class="stopwatch-btn-row" id="stopwatchBtnRow">
          <button class="stopwatch-btn" id="stopwatchStartBtn" data-i18n="stopwatchStart">Iniciar</button>
          <button class="stopwatch-btn" id="stopwatchCountdownBtn" data-i18n="stopwatchCountdown">Contador</button>
        </div>
      </div>
      <div class="sidebar-user-info" id="sidebarUserInfo">
        <div class="sidebar-user-avatar" id="sidebarUserAvatar">?</div>
        <div class="sidebar-user-name" id="sidebarUserName" data-i18n="loading">Cargando...</div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sidebar-user-chevron"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="sidebar-dropdown" id="userDropdown">
        <button class="sidebar-dropdown-item" id="showArchivedBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>
          <span data-i18n="archivedChats">Chats archivados</span>
        </button>
        <button class="sidebar-dropdown-item" id="toggleStopwatchBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5"/><path d="M9 2h6"/></svg>
          <span data-i18n="stopwatch">Cronómetro</span>
        </button>
        <button class="sidebar-dropdown-item sidebar-dropdown-item-danger" id="logoutBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span data-i18n="logout">Cerrar sesión</span>
        </button>
      </div>
    </div>
  </aside>

  <div class="page-content" id="pageContent">
    <nav class="top-bar visible" id="topBar">
      <div class="top-bar-left">
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" data-i18n-title="openSidebar" title="Abrir sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
          </svg>
        </button>
        <span class="top-bar-title" id="homeBtn" data-i18n="brand">LMS Exams</span>
        <span class="top-bar-chat-title" id="chatTitle" data-i18n-title="rename" title="Haz clic para renombrar">
          <span class="top-bar-chat-title-text" id="chatTitleText"></span>
          <input class="top-bar-chat-title-input hidden" id="chatTitleInput" type="text" maxlength="100">
        </span>
      </div>
      <div class="top-bar-right">
        <select id="topBarModelSelect" class="model-select"></select>
        <button class="context-btn" id="contextBtn">
          <svg class="context-ring" viewBox="0 0 36 36" width="28" height="28">
            <circle class="context-ring-bg" cx="18" cy="18" r="15.5" fill="none" stroke-width="3" />
            <circle class="context-ring-fg" id="contextRingFg" cx="18" cy="18" r="15.5" fill="none" stroke-width="3" stroke-dasharray="97.4" stroke-dashoffset="97.4" stroke-linecap="round" />
          </svg>
          <span class="context-ring-text" id="contextRingText">65%</span>
        </button>
        <button class="settings-btn" id="settingsBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 5H3"/><path d="M12 19H3"/><path d="M14 3v4"/><path d="M16 17v4"/><path d="M21 12h-9"/><path d="M21 19h-5"/><path d="M21 5h-7"/><path d="M8 10v4"/><path d="M8 12H3"/>
          </svg>
        </button>
      </div>
    </nav>

    <div class="hero-view" id="heroView">
      <div class="hero-greet-row">
        <p class="hero-line" id="heroLine1" data-i18n="heroGreeting">Hola,</p>
        <div class="name-chip hidden" id="nameChip">
          <span class="name-chip-plus" id="nameChipPlus">+</span>
          <button class="name-chip-btn" id="nameChipBtn" type="button" data-i18n="addName">Agregar nombre</button>
          <input class="name-chip-input hidden" id="nameChipInput" type="text" data-i18n-placeholder="addName" placeholder="Agregar nombre" maxlength="60">
        </div>
      </div>

      <div class="hero-ask-bar" id="heroAskBar">
        <input type="text" id="heroAskInput" class="hero-ask-input" data-i18n-placeholder="askPlaceholder" placeholder="Pregúntame lo que quieras…">
        <button class="hero-ask-send" id="heroAskSend" type="button" data-i18n-title="sendBtn" title="Enviar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>
    <div class="exam-mode-placeholder" id="examModePlaceholder" data-i18n="examModeSoon">Modo examen — próximamente.</div>

    <nav class="bottom-bar" id="bottomBar"></nav>
  </div>
</div>

<aside class="context-panel" id="contextPanel">
  <div class="context-panel-header">
    <h3 data-i18n="sessionInfo">Información de Sesión</h3>
    <button class="context-panel-close" id="contextPanelClose" data-i18n-title="close" title="Cerrar">✕</button>
  </div>
  <div class="context-panel-body" id="contextPanelBody"></div>
  <details class="pinned-messages-section" id="pinnedMessagesSection">
    <summary><span data-i18n="quickNotes">Notas rápidas</span> <span id="pinnedMessagesCount">0</span></summary>
    <div class="raw-messages-list" id="pinnedMessagesList"></div>
  </details>
</aside>

<div class="settings-overlay hidden" id="settingsOverlay">
  <div class="settings-card">
    <button class="settings-close-btn" id="settingsCloseBtn" data-i18n-title="close" title="Cerrar">✕</button>
    <aside class="settings-sidebar" id="settingsSidebar"></aside>
    <div class="settings-content" id="settingsContent"></div>
  </div>
</div>

<div class="memory-import-overlay hidden" id="memoryImportOverlay">
  <div class="memory-import-card">
    <button class="settings-close-btn" id="memoryImportCloseBtn" data-i18n-title="close" title="Cerrar">✕</button>
    <h3 class="memory-import-title" data-i18n="importMemoryTitle">Importa memoria a LMS Exam</h3>
    <p class="memory-import-instruction" data-i18n="importMemoryInstr1">Copia este prompt en el chat de tu anterior proveedor de IA:</p>
    <div class="memory-prompt-box">
      <textarea class="memory-prompt-text" id="memoryPromptText" readonly></textarea>
      <button class="memory-copy-btn" id="copyMemoryPromptBtn" type="button" data-i18n="copy">Copiar</button>
    </div>
    <p class="memory-import-instruction" data-i18n="importMemoryInstr2">Pega los resultados debajo para añadir la memoria a LMS Exam:</p>
    <textarea class="memory-import-input" id="memoryImportInput" data-i18n-placeholder="importMemoryPlaceholder" placeholder="Pega aquí el resultado..."></textarea>
    <button class="memory-save-btn" id="saveMemoryImportBtn" type="button" data-i18n="save">Guardar</button>
  </div>
</div>

<input type="file" id="avatarFileInput" accept="image/*" class="hidden-file-input">

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script type="module" src="js/chat.js"></script>
</body>
</html>
