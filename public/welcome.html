<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS Exams</title>
<link rel="stylesheet" href="css/welcome.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-brand" id="sidebarHome">LMS Exams</span>
      <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="Colapsar (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-body">
      <button class="sidebar-new-chat" id="sidebarNewChat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nuevo Chat
      </button>
      <div class="sidebar-history" id="sidebarHistory">
        <div class="sidebar-date-group">
          <div class="sidebar-date-label">Hoy</div>
          <div class="sidebar-chat-item active">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span>Chat actual</span>
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user-info" id="sidebarUserInfo">
        <div class="sidebar-user-avatar" id="sidebarUserAvatar">?</div>
        <div class="sidebar-user-name" id="sidebarUserName">Cargando...</div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sidebar-user-chevron"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="sidebar-dropdown" id="userDropdown">
        <button class="sidebar-dropdown-item" id="showArchivedBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>
          Chats archivados
        </button>
      </div>
    </div>
  </aside>

  <div class="page-content" id="pageContent">
    <nav class="top-bar" id="topBar">
      <div class="top-bar-left">
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" title="Abrir sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
          </svg>
        </button>
        <span class="top-bar-title" id="homeBtn">LMS Exams</span>
      </div>
      <div class="top-bar-right">
        <select id="topBarModelSelect" class="model-select"></select>
        <button class="context-btn" id="contextBtn">
          <svg class="context-ring" viewBox="0 0 36 36" width="28" height="28">
            <circle class="context-ring-bg" cx="18" cy="18" r="15.5" fill="none" stroke-width="3" />
            <circle class="context-ring-fg" id="contextRingFg" cx="18" cy="18" r="15.5" fill="none" stroke-width="3" stroke-dasharray="97.4" stroke-dashoffset="97.4" stroke-linecap="round" />
          </svg>
          <span class="context-ring-text" id="contextRingText">65%</span>
        </button>
        <button class="settings-btn" id="settingsBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 5H3"/><path d="M12 19H3"/><path d="M14 3v4"/><path d="M16 17v4"/><path d="M21 12h-9"/><path d="M21 19h-5"/><path d="M21 5h-7"/><path d="M8 10v4"/><path d="M8 12H3"/>
          </svg>
        </button>
      </div>
    </nav>

    <div class="hero">
      <p class="hero-line" id="line1">Hola,</p>
      <p class="hero-line" id="line2">bienvenido.</p>
      <p class="hero-sub" id="subtitle">Tu asistente de estudio personal.</p>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <nav class="bottom-bar" id="bottomBar">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="#" class="nav-link" id="chatTrigger">Chat<span class="cursor-blink">|</span></a>
    </nav>

    <div class="chat-panel" id="chatPanel"></div>
  </div>
</div>

<aside class="context-panel" id="contextPanel">
  <div class="context-panel-header">
    <h3>Información de Sesión</h3>
    <button class="context-panel-close" id="contextPanelClose">✕</button>
  </div>
  <div class="context-panel-body" id="contextPanelBody"></div>
</aside>

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script defer src="js/welcome.js"></script>
</body>
</html>
